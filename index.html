<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece: Grand Sea Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p1: #e74c3c; --p2: #3498db; }
        * { font-family: 'Fredoka', sans-serif; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000;
        }

        /* FIXED BACKGROUND LAYER */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('title_bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease-in-out;
        }

        /* MUTE BUTTON */
        #mute-btn {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(0,0,0,0.8); border: 2px solid #f1c40f;
            border-radius: 50%; width: 55px; height: 55px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: white;
        }

        .screen { 
            position: absolute; inset: 0; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.4); 
        }

        /* SELECTION CONTAINER */
        #select-screen { display: none; }
        .selection-container { 
            display: flex; gap: 30px; background: rgba(0,0,0,0.85); 
            padding: 25px; border-radius: 30px; border: 6px solid #f1c40f;
            max-width: 95vw; max-height: 80vh; overflow-y: auto;
        }
        .p-area { display: flex; flex-direction: column; align-items: center; min-width: 300px; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .char-card { background: #111; padding: 8px; border-radius: 15px; cursor: pointer; border: 5px solid transparent; transition: 0.2s; }
        .char-card img { height: 110px; width: auto; object-fit: contain; }
        .char-card:hover { transform: scale(1.05); background: #222; }
        .lock-btn { padding: 10px 25px; border-radius: 20px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: #f1c40f; margin-top: 10px; }
        .locked { background: #27ae60 !important; color: white; }

        /* BATTLEFIELD */
        #game-container { position: absolute; inset: 0; z-index: 150; display: none; flex-direction: row; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; position: relative; }
        .sprite-img { height: 350px; width: auto; object-fit: contain; filter: drop-shadow(0 0 25px rgba(255,255,255,0.4)); }
        .hit-overlay { position: absolute; width: 300px; height: 300px; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 200; pointer-events: none; }
        .hp-bar { width: 90%; height: 35px; background: #000; border: 3px solid #fff; border-radius: 20px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: #2ecc71; transition: 0.4s; }
        .quiz-card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 25px; width: 95%; color: #111; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        .main-btn { padding: 15px 40px; font-size: 1.8rem; border-radius: 50px; background: #f1c40f; color: #000; cursor: pointer; font-weight: bold; border: none; margin: 10px; }
        .btn-opt { padding: 12px; font-size: 1rem; border-radius: 10px; border: none; cursor: pointer; background: #eee; font-weight: bold; }

        #victory-screen { display: none; z-index: 500; background: rgba(0,0,0,0.95); }
        .shake { animation: shake 0.5s; filter: brightness(2.5) !important; }
        @keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-15px);} 75% {transform:translateX(15px);} }
        
        /* EDITOR SCROLL FIX */
        #editor-screen { display: none; z-index: 300; overflow-y: auto; background: rgba(0,0,0,0.95); }
        .edit-card { background: #333; padding: 15px; margin: 10px 0; border-radius: 15px; width: 100%; max-width: 600px; }
    </style>
</head>
<body onclick="playTitleMusic()">

    <div id="bg-layer"></div>
    <div id="mute-btn" onclick="toggleMute(event)">🎵</div>

    <div id="title-screen" class="screen">
        <h1 style="font-size: 5rem; color: #f1c40f; text-shadow: 6px 6px 0 #000; margin-bottom: 20px;">GRAND LINE</h1>
        <button class="main-btn" onclick="goToSelection()">ENTER WORLD</button>
        <button class="main-btn" style="background: #95a5a6; font-size: 1.1rem;" onclick="showEditor()">QUESTION EDITOR</button>
    </div>

    <div id="editor-screen" class="screen">
        <h2 style="color: #f1c40f;">QUESTION EDITOR</h2>
        <div id="editor-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="main-btn" onclick="closeEditor()" style="background: #2ecc71;">SAVE & RETURN</button>
    </div>

    <div id="select-screen" class="screen">
        <h2 style="color:gold; font-size: 2.2rem; margin-bottom: 10px;">SELECT YOUR FIGHTERS</h2>
        <div class="selection-container">
            <div class="p-area">
                <h3 style="color:var(--p1)">PLAYER 1</h3>
                <div id="grid1" class="char-grid"></div>
                <button id="lock1" class="lock-btn" onclick="lockChar(1)">CONFIRM</button>
            </div>
            <div class="p-area">
                <h3 style="color:var(--p2)">PLAYER 2</h3>
                <div id="grid2" class="char-grid"></div>
                <button id="lock2" class="lock-btn" onclick="lockChar(2)">CONFIRM</button>
            </div>
        </div>
        <button class="main-btn" id="fight-btn" style="margin-top:15px; display:none; background: #e74c3c; color:white;" onclick="startGame()">FIGHT!</button>
    </div>

    <div id="game-container">
        <div class="player-side">
            <img src="" id="p1-img" class="sprite-img">
            <img src="attack_effect.gif" id="p1-hit-gif" class="hit-overlay">
            <div class="hp-bar"><div id="p1-hp" class="hp-fill"></div></div>
            <div class="quiz-card"><h2 id="p1-q" style="font-size:1.2rem"></h2><div class="options-grid" id="p1-opts"></div></div>
        </div>
        <div class="player-side">
            <img src="" id="p2-img" class="sprite-img">
            <img src="attack_effect.gif" id="p2-hit-gif" class="hit-overlay">
            <div class="hp-bar"><div id="p2-hp" class="hp-fill"></div></div>
            <div class="quiz-card"><h2 id="p2-q" style="font-size:1.2rem"></h2><div class="options-grid" id="p2-opts"></div></div>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <h1 id="victory-text" style="font-size: 3.5rem; color: #f1c40f;"></h1>
        <img id="winner-gif" src="" style="height:350px; border-radius:20px; margin: 15px;">
        <button class="main-btn" onclick="location.reload()">NEW BATTLE</button>
    </div>

    <audio id="sfx-title" src="title_music.mp3" loop></audio>
    <audio id="sfx-hit" src="hit.mp3"></audio>
    <audio id="sfx-wrong" src="wrong.mp3"></audio>
    <audio id="sfx-voice"></audio>

    <script>
        const characters = [
            { name: "LUFFY", file: "luffy.gif", voice: "luffy_line.mp3" },
            { name: "ZORO", file: "zoro.gif", voice: "zoro_line.mp3" },
            { name: "SANJI", file: "sanji.gif", voice: "sanji_line.mp3" },
            { name: "NAMI", file: "nami.gif", voice: "nami_line.mp3" },
            { name: "CHOPPER", file: "chopper.gif", voice: "chopper_line.mp3" }
        ];

        let p1Char, p2Char, p1Locked = false, p2Locked = false, musicMuted = false;
        let h1 = 100, h2 = 100;
        
        let questionBank = Array(10).fill().map((_, i) => ({
            q: `Battle Question ${i+1}: What is Luffy's goal?`,
            a: "Pirate King", o: ["Pirate King", "Richest Man", "Strongest Cook", "Marine Hero"]
        }));

        function toggleMute(e) {
            e.stopPropagation();
            musicMuted = !musicMuted;
            document.getElementById('sfx-title').muted = musicMuted;
            document.getElementById('mute-btn').innerText = musicMuted ? "❌" : "🎵";
        }

        function playTitleMusic() { 
            const m = document.getElementById('sfx-title');
            if (m.paused) m.play().catch(()=>{}); 
        }

        function showEditor() {
            document.getElementById('title-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'block';
            const list = document.getElementById('editor-list');
            list.innerHTML = '';
            questionBank.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'edit-card';
                div.innerHTML = `<input type="text" value="${item.q}" style="width:100%" onchange="questionBank[${i}].q=this.value">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:5px;">
                    <input type="text" style="background:#d4edda" value="${item.o[0]}" onchange="questionBank[${i}].o[0]=this.value; questionBank[${i}].a=this.value">
                    <input type="text" value="${item.o[1]}" onchange="questionBank[${i}].o[1]=this.value">
                    <input type="text" value="${item.o[2]}" onchange="questionBank[${i}].o[2]=this.value">
                    <input type="text" value="${item.o[3]}" onchange="questionBank[${i}].o[3]=this.value">
                </div>`;
                list.appendChild(div);
            });
        }

        function closeEditor() {
            document.getElementById('editor-screen').style.display = 'none';
            document.getElementById('title-screen').style.display = 'flex';
        }

        function goToSelection() {
            document.getElementById('sfx-title').pause();
            document.getElementById('bg-layer').style.backgroundImage = "url('bg1.jpg')";
            document.getElementById('title-screen').style.display = 'none';
            document.getElementById('select-screen').style.display = 'flex';
            initSelection();
        }

        function initSelection() {
            [1, 2].forEach(p => {
                const grid = document.getElementById('grid' + p);
                grid.innerHTML = '';
                characters.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'char-card';
                    card.innerHTML = `<img src="${c.file}">`;
                    card.onclick = () => {
                        if((p===1 && p1Locked) || (p===2 && p2Locked)) return;
                        if(p === 1) p1Char = c; else p2Char = c;
                        Array.from(grid.children).forEach(el => el.style.borderColor = "transparent");
                        card.style.borderColor = (p === 1 ? "var(--p1)" : "var(--p2)");
                    };
                    grid.appendChild(card);
                });
            });
        }

        function lockChar(p) {
            if(p === 1 && p1Char) { p1Locked = true; document.getElementById('lock1').innerText = "READY"; document.getElementById('lock1').classList.add('locked'); playVoice(p1Char.voice); }
            else if(p === 2 && p2Char) { p2Locked = true; document.getElementById('lock2').innerText = "READY"; document.getElementById('lock2').classList.add('locked'); playVoice(p2Char.voice); }
            if(p1Locked && p2Locked) document.getElementById('fight-btn').style.display = 'block';
        }

        function playVoice(f) { const v = document.getElementById('sfx-voice'); v.src = f; v.play().catch(()=>{}); }

        function startGame() {
            document.getElementById('bg-layer').style.backgroundImage = "url('bg2.jpg')";
            document.getElementById('select-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('p1-img').src = p1Char.file;
            document.getElementById('p2-img').src = p2Char.file;
            loadQ(1); loadQ(2);
        }

        function loadQ(p) {
            const d = questionBank[Math.floor(Math.random() * questionBank.length)];
            document.getElementById(`p${p}-q`).innerText = d.q;
            const b = document.getElementById(`p${p}-opts`);
            b.innerHTML = '';
            [...d.o].sort(() => Math.random() - 0.5).forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = o;
                btn.onclick = () => {
                    if(o === d.a) attack(p === 1 ? 2 : 1);
                    else { document.getElementById('sfx-wrong').play(); attack(p); }
                    loadQ(p);
                };
                b.appendChild(btn);
            });
        }

        function attack(victimNum) {
            const sprite = document.getElementById(`p${victimNum}-img`);
            const gif = document.getElementById(`p${victimNum}-hit-gif`);
            const hitSfx = document.getElementById('sfx-hit');
            hitSfx.currentTime = 0; hitSfx.play();
            gif.style.display = 'block';
            sprite.classList.add('shake');
            if(victimNum === 1) h1 -= 10; else h2 -= 10;
            document.getElementById(`p${victimNum}-hp`).style.width = Math.max(0, (victimNum === 1 ? h1 : h2)) + '%';
            setTimeout(() => { gif.style.display = 'none'; sprite.classList.remove('shake'); }, 500);
            if(h1 <= 0 || h2 <= 0) showVictory(h1 <= 0 ? 2 : 1);
        }

        function showVictory(winnerNum) {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'flex';
            const winner = (winnerNum === 1) ? p1Char : p2Char;
            document.getElementById('victory-text').innerText = winner.name + " WINS!";
            document.getElementById('winner-gif').src = winner.file;
        }
    </script>
</body>
</html>
